<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}"
      lang="de">
<head><title>Meetings</title></head>
<body>
<main layout:fragment="content">

    <div class="page-header mb-4 d-flex justify-content-between align-items-center flex-wrap gap-2">
        <h1 class="page-title mb-0"><i class="bi bi-camera-video me-2"></i>Meetings</h1>
        <div class="d-flex gap-2 align-items-center flex-wrap">
            <div class="btn-group" role="group" aria-label="Ansicht">
                <button type="button" class="btn btn-outline-secondary active" id="btnListe"
                        onclick="setzeAnsicht('liste')">
                    <i class="bi bi-list-ul me-1"></i>Liste
                </button>
                <button type="button" class="btn btn-outline-secondary" id="btnKalender"
                        onclick="setzeAnsicht('kalender')">
                    <i class="bi bi-calendar3 me-1"></i>Kalender
                </button>
            </div>
            <a th:href="@{/meetings/export.csv}" class="btn btn-outline-secondary">
                <i class="bi bi-download me-1"></i>CSV
            </a>
            <a sec:authorize="hasAnyRole('ADMIN','MANAGER')"
               th:href="@{/meetings/neu}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>Neues Meeting
            </a>
        </div>
    </div>

    <!-- Listenansicht -->
    <div id="ansichtListe" class="card card-custom">
        <div th:if="${#lists.isEmpty(meetings)}" class="empty-state py-5">
            <i class="bi bi-camera-video text-muted" style="font-size:2.5rem"></i>
            <p class="text-muted mt-2 mb-0">Noch keine Meetings vorhanden</p>
        </div>
        <div th:unless="${#lists.isEmpty(meetings)}" class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Titel</th>
                        <th>Team</th>
                        <th>Notizen</th>
                        <th class="text-end">Aktionen</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${meetings}">
                        <td class="text-nowrap fw-medium"
                            th:text="${#temporals.format(m.datum, 'dd.MM.yyyy')}"></td>
                        <td>
                            <a th:href="@{/meetings/{id}(id=${m.id})}"
                               th:text="${m.titel}"
                               class="text-decoration-none text-dark fw-medium"></a>
                        </td>
                        <td>
                            <span th:if="${m.team != null}" class="badge"
                                  th:style="'background-color:' + ${m.team.farbe}"
                                  th:text="${m.team.name}"></span>
                            <span th:if="${m.team == null}" class="text-muted">—</span>
                        </td>
                        <td class="text-muted small"
                            th:text="${m.notizen != null and m.notizen.length() > 80}
                                ? ${m.notizen.substring(0,80)} + '…'
                                : ${m.notizen ?: '—'}"></td>
                        <td class="text-end text-nowrap">
                            <a sec:authorize="hasAnyRole('ADMIN','MANAGER')"
                               th:href="@{/meetings/{id}/bearbeiten(id=${m.id})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <button sec:authorize="hasAnyRole('ADMIN','MANAGER')"
                                    type="button" class="btn btn-sm btn-outline-danger"
                                    th:onclick="'loeschenBestaetigen(\'/meetings/' + ${m.id} + '/loeschen\')'">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Kalenderansicht -->
    <div id="ansichtKalender" class="card card-custom p-3" style="display:none">
        <div id="kalender"></div>
    </div>

</main>

<th:block layout:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <script th:inline="javascript">
    /*<![CDATA[*/
    const meetingEvents = /*[[${calendarEvents}]]*/ [];

    function setzeAnsicht(ansicht) {
        const liste    = document.getElementById('ansichtListe');
        const kalender = document.getElementById('ansichtKalender');
        const btnListe  = document.getElementById('btnListe');
        const btnKal    = document.getElementById('btnKalender');

        if (ansicht === 'kalender') {
            liste.style.display    = 'none';
            kalender.style.display = '';
            btnListe.classList.remove('active');
            btnKal.classList.add('active');

            if (!window._kalenderInit) {
                const cal = new FullCalendar.Calendar(document.getElementById('kalender'), {
                    initialView: 'dayGridMonth',
                    locale: 'de',
                    buttonText: {today: 'Heute', month: 'Monat', week: 'Woche', day: 'Tag'},
                    events: meetingEvents,
                    height: 'auto'
                });
                cal.render();
                window._kalenderInit = true;
            }
            sessionStorage.setItem('meetingsAnsicht', 'kalender');
        } else {
            liste.style.display    = '';
            kalender.style.display = 'none';
            btnListe.classList.add('active');
            btnKal.classList.remove('active');
            sessionStorage.setItem('meetingsAnsicht', 'liste');
        }
    }

    document.addEventListener('DOMContentLoaded', function () {
        if (sessionStorage.getItem('meetingsAnsicht') === 'kalender') {
            setzeAnsicht('kalender');
        }
    });
    /*]]>*/
    </script>
</th:block>
</body>
</html>
