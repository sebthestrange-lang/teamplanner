<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}"
      lang="de">
<head><title>Meetings</title></head>
<body>
<main layout:fragment="content">

    <div class="page-header mb-4 d-flex justify-content-between align-items-center">
        <h1 class="page-title mb-0"><i class="bi bi-camera-video me-2"></i>Meetings</h1>
        <a sec:authorize="hasAnyRole('ADMIN','MANAGER')"
           th:href="@{/meetings/neu}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Neues Meeting
        </a>
    </div>

    <div class="card card-custom">
        <div th:if="${#lists.isEmpty(meetings)}" class="empty-state py-5">
            <i class="bi bi-camera-video text-muted" style="font-size:2.5rem"></i>
            <p class="text-muted mt-2 mb-0">Noch keine Meetings vorhanden</p>
        </div>
        <div th:unless="${#lists.isEmpty(meetings)}" class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Titel</th>
                        <th>Notizen</th>
                        <th class="text-end">Aktionen</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="m : ${meetings}">
                        <td class="text-nowrap fw-medium"
                            th:text="${#temporals.format(m.datum, 'dd.MM.yyyy')}"></td>
                        <td>
                            <a th:href="@{/meetings/{id}(id=${m.id})}"
                               th:text="${m.titel}"
                               class="text-decoration-none text-dark fw-medium"></a>
                        </td>
                        <td class="text-muted small"
                            th:text="${m.notizen != null and m.notizen.length() > 80}
                                ? ${m.notizen.substring(0,80)} + '…'
                                : ${m.notizen ?: '—'}"></td>
                        <td class="text-end text-nowrap">
                            <a sec:authorize="hasAnyRole('ADMIN','MANAGER')"
                               th:href="@{/meetings/{id}/bearbeiten(id=${m.id})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <button sec:authorize="hasAnyRole('ADMIN','MANAGER')"
                                    type="button" class="btn btn-sm btn-outline-danger"
                                    th:onclick="'loeschenBestaetigen(\'/meetings/' + ${m.id} + '/loeschen\')'">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>
</body>
</html>
