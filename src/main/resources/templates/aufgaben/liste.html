<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head><title>Aufgaben</title></head>
<body>
<main layout:fragment="content">

    <div class="page-header mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Aufgaben</h1>
            <p class="text-muted mb-0" th:text="${#lists.size(aufgaben)} + ' Aufgaben'"></p>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/aufgaben/export}" class="btn btn-outline-secondary">
                <i class="bi bi-download me-1"></i>CSV
            </a>
            <a th:href="@{/aufgaben/neu}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>Neue Aufgabe
            </a>
        </div>
    </div>

    <!-- Filter -->
    <div class="card card-custom mb-4">
        <div class="card-body py-3">
            <form th:action="@{/aufgaben}" method="get" class="row g-2 align-items-end">
                <div class="col-6 col-md-2">
                    <label class="form-label small text-muted mb-1">Team</label>
                    <select name="teamId" class="form-select form-select-sm">
                        <option value="">Alle</option>
                        <option th:each="team : ${teams}" th:value="${team.id}" th:text="${team.name}"
                                th:selected="${filter.teamId == team.id}"></option>
                    </select>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label small text-muted mb-1">Mitarbeiter</label>
                    <select name="mitarbeiterId" class="form-select form-select-sm">
                        <option value="">Alle</option>
                        <option th:each="ma : ${mitarbeiter}" th:value="${ma.id}"
                                th:text="${ma.vollstaendigerName}"
                                th:selected="${filter.mitarbeiterId == ma.id}"></option>
                    </select>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label small text-muted mb-1">Projekt</label>
                    <select name="projektId" class="form-select form-select-sm">
                        <option value="">Alle</option>
                        <option th:each="p : ${projekte}" th:value="${p.id}" th:text="${p.name}"
                                th:selected="${filter.projektId == p.id}"></option>
                    </select>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label small text-muted mb-1">Status</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="">Alle</option>
                        <option th:each="s : ${aufgabenStatus}" th:value="${s.name()}"
                                th:text="${s.bezeichnung}"
                                th:selected="${filter.status == s}"></option>
                    </select>
                </div>
                <div class="col-6 col-md-2">
                    <label class="form-label small text-muted mb-1">Priorität</label>
                    <select name="prioritaet" class="form-select form-select-sm">
                        <option value="">Alle</option>
                        <option th:each="p : ${prioritaeten}" th:value="${p.name()}"
                                th:text="${p.bezeichnung}"
                                th:selected="${filter.prioritaet == p}"></option>
                    </select>
                </div>
                <div class="col-6 col-md-2 d-flex gap-1">
                    <button type="submit" class="btn btn-sm btn-primary flex-grow-1">
                        <i class="bi bi-funnel"></i>
                    </button>
                    <a th:href="@{/aufgaben}" class="btn btn-sm btn-light" title="Zurücksetzen">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(aufgaben)}" class="empty-state card-custom">
        <i class="bi bi-inbox text-muted" style="font-size:3rem"></i>
        <h5 class="mt-3 text-muted">Keine Aufgaben gefunden</h5>
        <a th:href="@{/aufgaben/neu}" class="btn btn-primary mt-2">Aufgabe anlegen</a>
    </div>

    <div th:unless="${#lists.isEmpty(aufgaben)}" class="card card-custom">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Aufgabe</th>
                        <th class="d-none d-md-table-cell">Projekt</th>
                        <th class="d-none d-md-table-cell">Mitarbeiter</th>
                        <th>Priorität</th>
                        <th>Status</th>
                        <th class="d-none d-sm-table-cell">Fällig</th>
                        <th class="text-end">Aktionen</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="aufgabe : ${aufgaben}"
                        th:class="${aufgabe.faelligAm != null and aufgabe.faelligAm.isBefore(#temporals.createToday()) and aufgabe.status.name() != 'ABGESCHLOSSEN'} ? 'table-danger' : ''">
                        <td class="fw-medium">
                            <a th:href="@{/aufgaben/{id}(id=${aufgabe.id})}"
                               th:text="${aufgabe.titel}"
                               class="text-decoration-none text-dark"></a>
                        </td>
                        <td class="d-none d-md-table-cell">
                            <a th:if="${aufgabe.projekt}"
                               th:href="@{/projekte/{id}(id=${aufgabe.projekt.id})}"
                               th:text="${aufgabe.projekt.name}"
                               class="text-decoration-none text-muted small"></a>
                            <span th:unless="${aufgabe.projekt}" class="text-muted">—</span>
                        </td>
                        <td class="d-none d-md-table-cell">
                            <span th:if="${aufgabe.mitarbeiter}" class="d-flex align-items-center gap-1">
                                <span class="avatar-xs"
                                      th:style="'background-color:' + ${aufgabe.mitarbeiter.team?.farbe ?: '#6366f1'}"
                                      th:text="${aufgabe.mitarbeiter.initialen}"></span>
                                <span class="small" th:text="${aufgabe.mitarbeiter.vollstaendigerName}"></span>
                            </span>
                            <span th:unless="${aufgabe.mitarbeiter}" class="text-muted">—</span>
                        </td>
                        <td>
                            <span th:class="'badge rounded-pill bg-' + ${aufgabe.prioritaet.bootstrapKlasse}"
                                  th:text="${aufgabe.prioritaet.bezeichnung}"></span>
                        </td>
                        <td>
                            <span th:class="'badge rounded-pill bg-' + ${aufgabe.status.bootstrapKlasse}"
                                  th:text="${aufgabe.status.bezeichnung}"></span>
                        </td>
                        <td class="text-nowrap d-none d-sm-table-cell">
                            <span th:if="${aufgabe.faelligAm}"
                                  th:text="${#temporals.format(aufgabe.faelligAm, 'dd.MM.yy')}"></span>
                            <span th:unless="${aufgabe.faelligAm}" class="text-muted">—</span>
                        </td>
                        <td class="text-end text-nowrap">
                            <a th:href="@{/aufgaben/{id}/bearbeiten(id=${aufgabe.id})}"
                               class="btn btn-xs btn-outline-primary">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <button type="button" class="btn btn-xs btn-outline-danger"
                                    th:onclick="'loeschenBestaetigen(\'/aufgaben/' + ${aufgabe.id} + '/loeschen\')'">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</main>
</body>
</html>
