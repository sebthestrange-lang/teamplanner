<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden | TeamPlaner</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 100%; max-width: 400px; }
        .logo-icon { width: 48px; height: 48px; background: #6366f1; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: white; margin: 0 auto 0.5rem; }
        .logo-text { font-size: 1.5rem; font-weight: 700; color: white; }
    </style>
</head>
<body>
<div class="login-card p-3">
    <div class="text-center mb-4">
        <div class="logo-icon"><i class="bi bi-kanban-fill"></i></div>
        <div class="logo-text">TeamPlaner</div>
    </div>

    <div class="card border-0 shadow-lg">
        <div class="card-body p-4">
            <h5 class="card-title mb-4 text-center fw-semibold">Anmelden</h5>

            <div th:if="${param.error}" class="alert alert-danger py-2 small">
                <i class="bi bi-exclamation-triangle me-1"></i>
                Benutzername oder Passwort falsch.
            </div>
            <div th:if="${param.abgemeldet}" class="alert alert-success py-2 small">
                <i class="bi bi-check-circle me-1"></i>
                Erfolgreich abgemeldet.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="benutzername" class="form-label">Benutzername</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" id="benutzername" name="benutzername"
                               class="form-control" placeholder="admin" autocomplete="username" autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="passwort" class="form-label">Passwort</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="passwort" name="passwort"
                               class="form-control" placeholder="••••••••" autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Anmelden
                </button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
