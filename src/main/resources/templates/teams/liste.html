<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head><title>Teams</title></head>
<body>
<main layout:fragment="content">

    <div class="page-header mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Teams</h1>
            <p class="text-muted mb-0" th:text="${#lists.size(teams)} + ' Teams insgesamt'"></p>
        </div>
        <a th:href="@{/teams/neu}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Neues Team
        </a>
    </div>

    <div th:if="${#lists.isEmpty(teams)}" class="empty-state card-custom">
        <i class="bi bi-people text-muted" style="font-size:3rem"></i>
        <h5 class="mt-3 text-muted">Noch keine Teams vorhanden</h5>
        <a th:href="@{/teams/neu}" class="btn btn-primary mt-2">Erstes Team anlegen</a>
    </div>

    <div th:unless="${#lists.isEmpty(teams)}" class="row g-3">
        <div th:each="team : ${teams}" class="col-sm-6 col-xl-4">
            <th:block th:with="al=${auslastungen[team.id]}">
            <div class="card card-custom card-hover h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <div class="team-color-dot"
                             th:style="'background-color:' + ${team.farbe}"></div>
                        <h5 class="mb-0 fw-semibold" th:text="${team.name}"></h5>
                    </div>

                    <!-- Mitglieder-Avatare -->
                    <div th:with="malist=${mitarbeiterByTeam[team.id]}" class="mb-3">
                        <div th:if="${#lists.isEmpty(malist)}" class="text-muted small">
                            <i class="bi bi-person-dash me-1"></i>Keine Mitglieder
                        </div>
                        <div th:unless="${#lists.isEmpty(malist)}" class="d-flex align-items-center flex-wrap gap-1">
                            <span th:each="ma : ${malist}"
                                  class="avatar-sm"
                                  th:style="'background-color:' + ${team.farbe}"
                                  th:text="${ma.initialen}"
                                  th:title="${ma.vollstaendigerName}"></span>
                            <small class="text-muted ms-1"
                                   th:text="${#lists.size(malist)} + ' Mitglied' + (${#lists.size(malist)} != 1 ? 'er' : '')"></small>
                        </div>
                    </div>

                    <!-- Auslastung -->
                    <div class="mb-2">
                        <div class="d-flex justify-content-between align-items-baseline mb-1">
                            <small class="text-muted">Auslastung</small>
                            <small class="fw-medium"
                                   th:text="${al.aktiv()} + ' / ' + ${al.gesamt()} + ' Aufgaben aktiv'"></small>
                        </div>
                        <div class="progress" style="height:6px">
                            <div th:class="'progress-bar bg-' + ${al.bootstrapFarbe()}"
                                 role="progressbar"
                                 th:style="'width:' + ${al.auslastungProzent()} + '%'"
                                 th:attr="aria-valuenow=${al.auslastungProzent()}"
                                 aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </div>

                    <p class="text-muted small mb-0">
                        Erstellt am <span th:text="${#temporals.format(team.erstelltAm, 'dd.MM.yyyy')}"></span>
                    </p>
                </div>
                <div class="card-footer-custom d-flex gap-2">
                    <a th:href="@{/teams/{id}(id=${team.id})}" class="btn btn-sm btn-outline-secondary flex-grow-1">
                        <i class="bi bi-eye me-1"></i>Details
                    </a>
                    <a th:href="@{/teams/{id}/bearbeiten(id=${team.id})}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <button type="button" class="btn btn-sm btn-outline-danger"
                            th:onclick="'loeschenBestaetigen(\'/teams/' + ${team.id} + '/loeschen\')'">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
            </th:block>
        </div>
    </div>

</main>
</body>
</html>
