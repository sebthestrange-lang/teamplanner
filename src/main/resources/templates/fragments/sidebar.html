<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="de">
<body>

<nav th:fragment="sidebar"
     id="mainSidebar"
     class="sidebar offcanvas-lg offcanvas-start d-flex flex-column"
     tabindex="-1"
     aria-labelledby="mainSidebarLabel">

    <!-- Mobile: Offcanvas Header with close button -->
    <div class="offcanvas-header sidebar-logo d-lg-none">
        <a th:href="@{/}" class="text-decoration-none d-flex align-items-center gap-2">
            <div class="logo-icon">
                <i class="bi bi-kanban-fill"></i>
            </div>
            <span class="logo-text" id="mainSidebarLabel">Teamplanner</span>
        </a>
        <button type="button" class="btn-close btn-close-white"
                data-bs-dismiss="offcanvas" data-bs-target="#mainSidebar"
                aria-label="Schließen"></button>
    </div>

    <!-- Desktop: Logo -->
    <div class="sidebar-logo d-none d-lg-flex align-items-center">
        <a th:href="@{/}" class="text-decoration-none d-flex align-items-center gap-2">
            <div class="logo-icon">
                <i class="bi bi-kanban-fill"></i>
            </div>
            <span class="logo-text">Teamplanner</span>
        </a>
    </div>

    <!-- Navigation -->
    <ul class="nav flex-column sidebar-nav px-3 flex-grow-1">

        <li class="nav-item">
            <a th:href="@{/}"
               th:classappend="${currentUri == '/'} ? 'active' : ''"
               class="nav-link sidebar-link">
                <i class="bi bi-speedometer2"></i>
                <span>Dashboard</span>
            </a>
        </li>

        <li class="sidebar-section-label">Verwaltung</li>

        <li class="nav-item">
            <a th:href="@{/teams}"
               th:classappend="${currentUri?.startsWith('/teams')} ? 'active' : ''"
               class="nav-link sidebar-link">
                <i class="bi bi-people-fill"></i>
                <span>Teams</span>
            </a>
        </li>

        <li class="nav-item">
            <a th:href="@{/mitarbeiter}"
               th:classappend="${currentUri?.startsWith('/mitarbeiter')} ? 'active' : ''"
               class="nav-link sidebar-link">
                <i class="bi bi-person-badge-fill"></i>
                <span>Mitarbeiter</span>
            </a>
        </li>

        <li class="nav-item">
            <a th:href="@{/projekte}"
               th:classappend="${currentUri?.startsWith('/projekte')} ? 'active' : ''"
               class="nav-link sidebar-link">
                <i class="bi bi-folder2-open"></i>
                <span>Projekte</span>
            </a>
        </li>

        <li class="sidebar-section-label" sec:authorize="hasRole('ADMIN')">Administration</li>

        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/organisationen}"
               th:classappend="${currentUri?.startsWith('/organisationen')} ? 'active' : ''"
               class="nav-link sidebar-link">
                <i class="bi bi-building"></i>
                <span>Organisationen</span>
            </a>
        </li>

        <li class="nav-item" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/benutzer}"
               th:classappend="${currentUri?.startsWith('/benutzer')} ? 'active' : ''"
               class="nav-link sidebar-link">
                <i class="bi bi-shield-lock-fill"></i>
                <span>Benutzer</span>
            </a>
        </li>

        <li class="nav-item">
            <a th:href="@{/meetings}"
               th:classappend="${currentUri?.startsWith('/meetings')} ? 'active' : ''"
               class="nav-link sidebar-link">
                <i class="bi bi-camera-video"></i>
                <span>Meetings</span>
            </a>
        </li>

        <li class="sidebar-section-label">Aufgaben</li>

        <li class="nav-item">
            <a th:href="@{/aufgaben}"
               th:classappend="${currentUri?.startsWith('/aufgaben')} ? 'active' : ''"
               class="nav-link sidebar-link d-flex justify-content-between align-items-center">
                <span><i class="bi bi-check2-square me-2"></i>Aufgaben</span>
                <span th:if="${sidebarUeberfaelligeAufgaben > 0}"
                      th:text="${sidebarUeberfaelligeAufgaben}"
                      class="badge badge-danger-soft">0</span>
            </a>
        </li>

        <li class="nav-item">
            <a th:href="@{/todos}"
               th:classappend="${currentUri?.startsWith('/todos')} ? 'active' : ''"
               class="nav-link sidebar-link d-flex justify-content-between align-items-center">
                <span><i class="bi bi-list-check me-2"></i>Todos</span>
                <span th:if="${sidebarOffeneTodos > 0}"
                      th:text="${sidebarOffeneTodos}"
                      class="badge badge-primary-soft">0</span>
            </a>
        </li>
    </ul>

    <!-- Footer -->
    <div class="sidebar-footer">
        <div class="d-flex align-items-center gap-2 overflow-hidden mb-2">
            <i class="bi bi-person-circle flex-shrink-0"></i>
            <div class="overflow-hidden">
                <div class="small fw-semibold text-truncate" sec:authentication="name">Benutzer</div>
                <div class="text-muted" style="font-size:.7rem">v1.0.0</div>
            </div>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-sm btn-outline-secondary w-100">
                <i class="bi bi-box-arrow-right me-1"></i>Abmelden
            </button>
        </form>
    </div>
</nav>

</body>
</html>
