<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head><title th:text="${aktion}">Organisation</title></head>
<body>
<main layout:fragment="content">

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/organisationen}">Organisationen</a></li>
            <li class="breadcrumb-item active" th:text="${aktion}"></li>
        </ol>
    </nav>

    <div class="page-header mb-4">
        <h1 class="page-title" th:text="${aktion}"></h1>
    </div>

    <div class="card card-custom" style="max-width:500px">
        <div class="card-body p-4">
            <form th:action="${organisation.id == null ? '/organisationen' : '/organisationen/' + organisation.id}"
                  th:object="${organisation}" method="post">

                <div class="mb-3">
                    <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
                    <input type="text" id="name" th:field="*{name}" class="form-control"
                           th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                           placeholder="z.B. Acme GmbH">
                    <div th:if="${#fields.hasErrors('name')}" class="invalid-feedback"
                         th:errors="*{name}"></div>
                </div>

                <div class="d-flex gap-2 justify-content-end">
                    <a th:href="@{/organisationen}" class="btn btn-light">Abbrechen</a>
                    <button type="submit" class="btn btn-primary" th:text="${aktion}"></button>
                </div>
            </form>
        </div>
    </div>

</main>
</body>
</html>
