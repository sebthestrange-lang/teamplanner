<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | TeamPlaner">TeamPlaner</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">

    <!-- Sidebar -->
    <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

    <!-- Main Area -->
    <div class="main-area">

        <!-- Mobile Topbar -->
        <nav class="mobile-topbar d-flex d-lg-none align-items-center justify-content-between">
            <button class="mobile-menu-btn" type="button"
                    data-bs-toggle="offcanvas" data-bs-target="#mainSidebar"
                    aria-controls="mainSidebar" aria-label="Navigation öffnen">
                <i class="bi bi-list fs-4"></i>
            </button>
            <a th:href="@{/}" class="text-decoration-none d-flex align-items-center gap-2">
                <div class="logo-icon" style="width:28px;height:28px;font-size:.8rem">
                    <i class="bi bi-kanban-fill"></i>
                </div>
                <span class="logo-text">TeamPlaner</span>
            </a>
            <form th:action="@{/logout}" method="post" class="d-flex align-items-center">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-sm p-0 border-0 bg-transparent text-white" title="Abmelden">
                    <i class="bi bi-box-arrow-right fs-5"></i>
                </button>
            </form>
        </nav>

        <!-- Toast Container -->
        <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999">
            <th:block th:replace="~{fragments/alerts :: toasts}"></th:block>
        </div>

        <!-- Page Content -->
        <main class="main-content" layout:fragment="content">
            <!-- Seiteninhalt hier -->
        </main>
    </div>
</div>

<!-- Delete Modal -->
<div class="modal fade" id="loeschenModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-semibold">Wirklich löschen?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-muted small">
                Diese Aktion kann nicht rückgängig gemacht werden.
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-sm btn-light" data-bs-dismiss="modal">Abbrechen</button>
                <form id="loeschenForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-sm btn-danger">Löschen</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Toasts automatisch anzeigen
    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('.toast').forEach(el => new bootstrap.Toast(el, {delay: 3500}).show());
    });

    // Lösch-Modal befüllen
    function loeschenBestaetigen(actionUrl) {
        document.getElementById('loeschenForm').action = actionUrl;
        new bootstrap.Modal(document.getElementById('loeschenModal')).show();
    }
</script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
