<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head><title>Mitarbeiter</title></head>
<body>
<main layout:fragment="content">

    <div class="page-header mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Mitarbeiter</h1>
            <p class="text-muted mb-0" th:text="${#lists.size(mitarbeiter)} + ' Mitarbeiter'"></p>
        </div>
        <a th:href="@{/mitarbeiter/neu}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Neuer Mitarbeiter
        </a>
    </div>

    <!-- Filter -->
    <div class="card card-custom mb-4">
        <div class="card-body py-3">
            <form th:action="@{/mitarbeiter}" method="get" class="row g-2 align-items-end">
                <div class="col-sm-6 col-md-4">
                    <label class="form-label small text-muted mb-1">Team</label>
                    <select name="teamId" class="form-select form-select-sm">
                        <option value="">Alle Teams</option>
                        <option th:each="team : ${teams}" th:value="${team.id}" th:text="${team.name}"
                                th:selected="${filter.teamId == team.id}"></option>
                    </select>
                </div>
                <div class="col-sm-6 col-md-3">
                    <label class="form-label small text-muted mb-1">Rolle</label>
                    <input type="text" name="rolle" class="form-control form-control-sm"
                           placeholder="z.B. Developer" th:value="${filter.rolle}">
                </div>
                <div class="col-sm-8 col-md-3">
                    <label class="form-label small text-muted mb-1">Suche</label>
                    <input type="text" name="suche" class="form-control form-control-sm"
                           placeholder="Name, E-Mail..." th:value="${filter.suche}">
                </div>
                <div class="col-sm-4 col-md-2 d-flex gap-2">
                    <button type="submit" class="btn btn-sm btn-primary flex-grow-1">
                        <i class="bi bi-funnel me-1"></i>Filtern
                    </button>
                    <a th:href="@{/mitarbeiter}" class="btn btn-sm btn-light" title="Zurücksetzen">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(mitarbeiter)}" class="empty-state card-custom">
        <i class="bi bi-person-x text-muted" style="font-size:3rem"></i>
        <h5 class="mt-3 text-muted">Keine Mitarbeiter gefunden</h5>
        <a th:href="@{/mitarbeiter/neu}" class="btn btn-primary mt-2">Mitarbeiter anlegen</a>
    </div>

    <div th:unless="${#lists.isEmpty(mitarbeiter)}" class="row g-3">
        <div th:each="ma : ${mitarbeiter}" class="col-sm-6 col-xl-4">
            <div class="card card-custom card-hover h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-3 mb-2">
                        <div class="avatar flex-shrink-0"
                             th:style="'background-color:' + ${ma.team?.farbe ?: '#6366f1'}"
                             th:text="${ma.initialen}"></div>
                        <div class="overflow-hidden">
                            <h6 class="mb-0 fw-semibold text-truncate" th:text="${ma.vollstaendigerName}"></h6>
                            <small class="text-muted" th:text="${ma.rolle ?: '—'}"></small>
                        </div>
                    </div>
                    <div th:if="${ma.team}" class="mb-1">
                        <span class="badge rounded-pill"
                              th:style="'background-color:' + ${ma.team.farbe} + '22; color:' + ${ma.team.farbe}"
                              th:text="${ma.team.name}"></span>
                    </div>
                    <div th:if="${ma.email}" class="small text-muted text-truncate">
                        <i class="bi bi-envelope me-1"></i>
                        <span th:text="${ma.email}"></span>
                    </div>
                </div>
                <div class="card-footer-custom d-flex gap-2">
                    <a th:href="@{/mitarbeiter/{id}(id=${ma.id})}" class="btn btn-sm btn-outline-secondary flex-grow-1">
                        <i class="bi bi-eye me-1"></i>Details
                    </a>
                    <a th:href="@{/mitarbeiter/{id}/bearbeiten(id=${ma.id})}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <button type="button" class="btn btn-sm btn-outline-danger"
                            th:onclick="'loeschenBestaetigen(\'/mitarbeiter/' + ${ma.id} + '/loeschen\')'">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

</main>
</body>
</html>
