<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}"
      lang="de">
<head><title>Projekte</title></head>
<body>
<main layout:fragment="content">

    <div class="page-header mb-4 d-flex justify-content-between align-items-center">
        <div>
            <h1 class="page-title">Projekte</h1>
            <p class="text-muted mb-0" th:text="${#lists.size(projekte)} + ' Projekte'"></p>
        </div>
        <a th:href="@{/projekte/neu}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Neues Projekt
        </a>
    </div>

    <!-- Filter -->
    <div class="card card-custom mb-4">
        <div class="card-body py-3">
            <form th:action="@{/projekte}" method="get" class="row g-2 align-items-end">
                <div class="col-sm-6 col-md-3">
                    <label class="form-label small text-muted mb-1">Team</label>
                    <select name="teamId" class="form-select form-select-sm">
                        <option value="">Alle Teams</option>
                        <option th:each="team : ${teams}" th:value="${team.id}" th:text="${team.name}"
                                th:selected="${filter.teamId == team.id}"></option>
                    </select>
                </div>
                <div class="col-sm-6 col-md-3">
                    <label class="form-label small text-muted mb-1">Status</label>
                    <select name="status" class="form-select form-select-sm">
                        <option value="">Alle Status</option>
                        <option th:each="s : ${projektStatus}" th:value="${s.name()}" th:text="${s.bezeichnung}"
                                th:selected="${filter.status == s}"></option>
                    </select>
                </div>
                <div class="col-sm-8 col-md-3">
                    <label class="form-label small text-muted mb-1">Suche</label>
                    <input type="text" name="suche" class="form-control form-control-sm"
                           placeholder="Projektname..." th:value="${filter.suche}">
                </div>
                <div class="col-sm-4 col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-sm btn-primary flex-grow-1">
                        <i class="bi bi-funnel me-1"></i>Filtern
                    </button>
                    <a th:href="@{/projekte}" class="btn btn-sm btn-light" title="Zurücksetzen">
                        <i class="bi bi-x-lg"></i>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(projekte)}" class="empty-state card-custom">
        <i class="bi bi-folder-x text-muted" style="font-size:3rem"></i>
        <h5 class="mt-3 text-muted">Keine Projekte gefunden</h5>
        <a th:href="@{/projekte/neu}" class="btn btn-primary mt-2">Projekt anlegen</a>
    </div>

    <div th:unless="${#lists.isEmpty(projekte)}" class="row g-3">
        <div th:each="projekt : ${projekte}" class="col-sm-6 col-xl-4">
            <div class="card card-custom card-hover h-100"
                 th:style="'border-left: 4px solid ' + ${projekt.farbe ?: '#6366f1'}">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h6 class="mb-0 fw-semibold">
                            <a th:href="@{/projekte/{id}(id=${projekt.id})}"
                               th:text="${projekt.name}"
                               class="text-decoration-none text-dark"></a>
                        </h6>
                        <span th:class="'badge rounded-pill bg-' + ${projekt.status.bootstrapKlasse}"
                              th:text="${projekt.status.bezeichnung}"></span>
                    </div>
                    <p th:if="${projekt.beschreibung}" class="text-muted small mb-2 text-truncate"
                       th:text="${projekt.beschreibung}"></p>
                    <div th:if="${projekt.team}" class="mb-2">
                        <span class="badge rounded-pill small"
                              th:style="'background-color:' + ${projekt.team.farbe} + '22; color:' + ${projekt.team.farbe}"
                              th:text="${projekt.team.name}"></span>
                    </div>
                    <div th:if="${projekt.faelligAm}" class="small text-muted">
                        <i class="bi bi-calendar3 me-1"></i>
                        Fällig: <span th:text="${#temporals.format(projekt.faelligAm, 'dd.MM.yyyy')}"></span>
                    </div>
                </div>
                <div class="card-footer-custom d-flex gap-2">
                    <a th:href="@{/projekte/{id}(id=${projekt.id})}" class="btn btn-sm btn-outline-secondary flex-grow-1">
                        <i class="bi bi-eye me-1"></i>Details
                    </a>
                    <a th:href="@{/projekte/{id}/bearbeiten(id=${projekt.id})}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <button type="button" class="btn btn-sm btn-outline-danger"
                            th:onclick="'loeschenBestaetigen(\'/projekte/' + ${projekt.id} + '/loeschen\')'">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

</main>
</body>
</html>
