# Dev-Profil: aktivieren mit --spring.profiles.active=dev oder -Dspring.profiles.active=dev

# H2 Console im Entwicklungsmodus aktivieren
spring.h2.console.enabled=true

# SQL-Ausgabe im Dev-Modus
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ausführlicheres Logging
logging.level.de.teamplaner=DEBUG
logging.level.org.springframework.web=DEBUG
